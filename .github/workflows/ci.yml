name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + build + unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: "file:./prisma/ci.db"
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          AUTH_SECRET: ci-build-only-secret-32-characters-min

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate Prisma client
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: "file:./prisma/e2e.db"
      - name: Run Playwright
        run: pnpm test:e2e
        env:
          CI: "true"
          AUTH_SECRET: e2e-ci-secret-at-least-32-characters
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
