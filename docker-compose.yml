# atrium — single-command local / self-host setup
# Usage: cp .env.example .env && docker compose up -d
#
# Optional profiles (enable with `--profile <name>`):
#   - otel    : OpenTelemetry collector sidecar
#   - ollama  : local-only LLM (Ollama) — keeps curation calls inside the cluster

services:
  atrium:
    build: .
    image: ghcr.io/your-org/atrium:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atrium:${POSTGRES_PASSWORD:-atrium}@postgres:5432/atrium?schema=public
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atrium}
      POSTGRES_DB: atrium
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium"]
      interval: 10s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    profiles: ["otel"]

  # Local LLM sidecar. Register it in Admin → LLM providers as:
  #   provider  = ollama
  #   baseUrl   = http://ollama:11434/v1
  #   model     = gemma3:4b  (or any model you've pulled below)
  #
  # First-time setup pulls a model into the volume:
  #   docker compose --profile ollama exec ollama ollama pull gemma3:4b
  #
  # Lightweight options: gemma3:1b, qwen2.5:3b (fits in <2 GB)
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - atrium_ollama:/root/.ollama
    ports:
      - "11434:11434"
    profiles: ["ollama"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  atrium_pgdata:
  atrium_ollama:
