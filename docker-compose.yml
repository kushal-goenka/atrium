# atrium — single-command local / self-host setup
# Usage: cp .env.example .env && docker compose up -d

services:
  atrium:
    build: .
    image: ghcr.io/your-org/atrium:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atrium:${POSTGRES_PASSWORD:-atrium}@postgres:5432/atrium?schema=public
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atrium}
      POSTGRES_DB: atrium
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium"]
      interval: 10s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    profiles: ["otel"]

volumes:
  atrium_pgdata:
